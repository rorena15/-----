<!DOCTYPE html>
<html lang="ko" encording = "UTF-8">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인생네컷 메이커</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="main_css.css">
<script src="life4.js"></script>
</head>
<body>
<div class="flash-overlay" id="flash"></div>

<header>
  <h1>인생<span>네컷</span> 메이커 📸</h1>
</header>

<!-- Step Indicator -->
<div class="step-bar" id="stepBar">
  <div class="step-item active" id="si1">
    <div class="step-circle">1</div>
    <div class="step-label">촬영</div>
  </div>
  <div class="step-line" id="sl1"></div>
  <div class="step-item" id="si2">
    <div class="step-circle">2</div>
    <div class="step-label">셀렉</div>
  </div>
  <div class="step-line" id="sl2"></div>
  <div class="step-item" id="si3">
    <div class="step-circle">3</div>
    <div class="step-label">꾸미기</div>
  </div>
  <div class="step-line" id="sl3"></div>
  <div class="step-item" id="si4">
    <div class="step-circle">4</div>
    <div class="step-label">저장</div>
  </div>
</div>

<!-- ══ PAGE 1: SHOOT ══ -->
<div class="page active" id="page1">
  <div class="shoot-wrap">
    <p class="hint-text" id="shootHint">카메라를 켜서 6장을 찍거나 파일을 업로드하세요</p>

    <div class="progress-shots" id="progressDots"></div>

    <div class="cam-area" id="camArea">
      <video id="camVideo" autoplay playsinline muted></video>
      <div class="countdown-overlay" id="countdown"></div>
      <div class="shot-label" id="shotLabel"></div>
    </div>

    <div class="cam-controls">
      <button class="cam-btn" id="startCamBtn">📷 카메라 켜기</button>
      <button class="cam-btn shoot hidden" id="shootBtn">● 6장 연속 촬영</button>
      <button class="cam-btn hidden" id="stopCamBtn">✕ 끄기</button>
      <button class="cam-btn" id="uploadBtn">🖼 파일 업로드</button>
      <button class="cam-btn" id="resetBtn">🔄 초기화</button>
    </div>

    <button class="next-btn" id="toSelectBtn">다음 — 사진 고르기 →</button>
  </div>
</div>

<!-- ══ PAGE 2: SELECT ══ -->
<div class="page" id="page2">
  <div class="select-wrap">
    <p class="select-info">찍은 6장 중 <span>4장</span>을 순서대로 선택하세요</p>
    <div class="select-grid" id="selectGrid"></div>
    <button class="next-btn" id="toDecorBtn">다음 — 꾸미기 →</button>
  </div>
</div>

<!-- ══ PAGE 3: DECORATE ══ -->
<div class="page" id="page3">
  <div class="decor-wrap">
    <div class="sidebar">
      <div class="panel">
        <h3>프레임</h3>
        <div class="frame-list">
          <button class="frame-btn active" data-frame="classic">🎞 클래식</button>
          <button class="frame-btn" data-frame="minimal">⬜ 미니멀</button>
          <button class="frame-btn" data-frame="film">📷 필름</button>
          <button class="frame-btn" data-frame="polaroid">🖼 폴라로이드</button>
          <button class="frame-btn" data-frame="scrap">✂️ 스크랩북</button>
        </div>
      </div>
      <div class="panel">
        <h3>프레임 배경 이미지</h3>
        <button class="add-text-btn" id="bgImgBtn" style="margin-bottom:6px;">🖼 이미지 업로드</button>
        <button class="add-text-btn" id="bgImgClearBtn">✕ 이미지 제거</button>
        <input type="file" id="bgImgInput" accept="image/*" style="display:none;">
      </div>
      <div class="panel">
        <h3>배경색</h3>
        <div class="color-row">
          <div class="color-dot active" data-color="#ffffff" style="background:#fff;border-color:#ddd;"></div>
          <div class="color-dot" data-color="#fef3c7" style="background:#fef3c7;"></div>
          <div class="color-dot" data-color="#dbeafe" style="background:#dbeafe;"></div>
          <div class="color-dot" data-color="#fce7f3" style="background:#fce7f3;"></div>
          <div class="color-dot" data-color="#d1fae5" style="background:#d1fae5;"></div>
          <div class="color-dot" data-color="#1e293b" style="background:#1e293b;"></div>
        </div>
      </div>
      <div class="panel">
        <h3>스티커</h3>
        <div class="sticker-row">
          <span class="sticker-btn" data-sticker="⭐">⭐</span>
          <span class="sticker-btn" data-sticker="💫">💫</span>
          <span class="sticker-btn" data-sticker="🌸">🌸</span>
          <span class="sticker-btn" data-sticker="🎀">🎀</span>
          <span class="sticker-btn" data-sticker="🌙">🌙</span>
          <span class="sticker-btn" data-sticker="✨">✨</span>
          <span class="sticker-btn" data-sticker="🍀">🍀</span>
          <span class="sticker-btn" data-sticker="💛">💛</span>
          <span class="sticker-btn" data-sticker="🦋">🦋</span>
          <span class="sticker-btn" data-sticker="🌈">🌈</span>
        </div>
      </div>
      <div class="panel text-input-wrap">
        <h3>문구</h3>
        <input type="text" id="textInput" placeholder="문구 입력...">
        <button class="add-text-btn" id="addTextBtn">+ 추가</button>
      </div>
    </div>
    <div class="decor-right">
      <canvas id="mainCanvas" width="300" height="680"></canvas>
      <button class="to-save-btn" id="toSaveBtn">다음 — 저장하기 →</button>
    </div>
  </div>
</div>

<!-- ══ PAGE 4: SAVE ══ -->
<div class="page" id="page4">
  <div class="save-wrap">
    <div class="save-title">완성! 🎉 나만의 <span>네컷</span></div>
    <img class="save-preview" id="savePreview" src="" alt="완성된 네컷">
    <button class="dl-btn" id="dlBtn">⬇ 이미지 저장하기</button>

    <!-- QR CODE SECTION -->
    <div class="qr-section">
      <div class="qr-title">📲 QR 코드로 다운받기</div>
      <div class="qr-desc">스마트폰으로 QR을 스캔하면 바로 저장돼요!</div>
      <div class="qr-box" id="qrBox">
        <div class="qr-loading" id="qrLoading">생성 중...</div>
        <canvas id="qrCanvas" style="display:none;"></canvas>
      </div>
      <div class="qr-share-row">
        <button class="qr-share-btn" id="qrDlBtn">🖼 QR 저장</button>
        <button class="qr-share-btn" id="copyLinkBtn">🔗 링크 복사</button>
      </div>
    </div>

    <button class="restart-btn" id="restartBtn">🔄 처음부터 다시</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">
</body>
</html>
